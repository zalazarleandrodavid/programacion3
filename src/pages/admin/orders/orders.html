<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pedidos | FoodStore</title>
    <link rel="stylesheet" href="../../../style.css">
</head>
<body>

    <header class="admin-nav-header">
        <div class="admin-nav-logo">FoodStore Admin</div>
        <nav class="admin-nav-links">
            <a href="/src/pages/store/home/home.html">Tienda</a>
            <a href="/src/pages/admin/adminHome/adminHome.html">Panel Administración</a>
            <button class="admin-nav-logout-btn">Cerrar Sesión</button>
        </nav>
    </header>

    <div class="admin-container">
        <aside class="sidebar">
            <h2>Admin Panel</h2>
            <nav>
                <ul>
                    <li><a href="/src/pages/admin/adminHome/adminHome.html">Dashboard</a></li>
                    <li><a href="/src/pages/admin/categories/categories.html">Categorías</a></li>
                    <li><a href="/src/pages/admin/product/product.html">Productos</a></li>
                    <li><a href="/src/pages/admin/orders/orders.html" class="active">Pedidos</a></li>
                    <li><hr></li>
                    <li><a href="/src/pages/store/home/home.html">Ver Tienda</a></li>
                </ul>
            </nav>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h1>Gestión de Pedidos</h1>
                <select id="filter-status" class="filter-select">
                    <option value="todos">Todos los pedidos</option>
                    <option value="pending">Pendiente</option>
                    <option value="processing">En preparación</option>
                    <option value="completed">Entregado</option>
                </select>
            </header>

            <div id="orders-container" class="orders-grid"></div>
        </main>
    </div>

    <div id="order-detail-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal-btn" id="close-modal-btn">&times;</button>
            <h2 id="modal-order-title">Detalle del Pedido</h2>
            
            <div class="info-box">
                <p><strong>Cliente:</strong> <span id="modal-cliente-nombre"></span></p>
                <p><strong>Fecha:</strong> <span id="modal-pedido-fecha"></span></p>
                <p><strong>Teléfono:</strong> <span id="modal-cliente-telefono"></span></p>
                <p><strong>Dirección:</strong> <span id="modal-cliente-direccion"></span></p>
                <p><strong>Método de pago:</strong> <span id="modal-pedido-pago"></span></p>
            </div>

            <h3>Productos:</h3>
            <div id="modal-products-container"></div>

            <div class="totals-box">
                <div class="total-row">
                    <span>Subtotal:</span>
                    <span id="modal-summary-subtotal">$0.00</span>
                </div>
                <div class="total-row">
                    <span>Envío:</span>
                    <span id="modal-summary-envio">$0.00</span>
                </div>
                <div class="total-row final-total">
                    <span>Total:</span>
                    <span id="modal-summary-total">$0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./orders.ts"></script>
</body>
</html>
